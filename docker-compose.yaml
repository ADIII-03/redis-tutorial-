services:
  redis:
    image: redis:7-alpine
    container_name: adi-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  mongodb:
    image: mongo:7.0.5
    container_name: adi-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: adi-db
    volumes:
      - mongo-data:/data/db

volumes:
  redis-data:
  mongo-data: 